<link rel="stylesheet" href="../styles.css" />

</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../data.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function PageNav() {
  return (
    <header style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, padding: "20px 0" }}>
      <div style={{
        maxWidth: 1320, margin: "0 auto", padding: "12px 28px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        background: "rgba(12, 14, 20, 0.72)",
        backdropFilter: "blur(18px) saturate(140%)",
        WebkitBackdropFilter: "blur(18px) saturate(140%)",
        border: "1px solid var(--line)",
        borderRadius: 999,
      }}>
        <a href="../index.html" style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <img src="../assets/glamourgeek-isotipo.png" alt="GlamourGeek" style={{ height: 32 }} />
          <span className="font-display" style={{ fontSize: 17, fontWeight: 700, letterSpacing: "-0.02em", display: "flex", gap: 4 }}>
            <span style={{ color: "var(--brand-cyan-bright)" }}>Glamour</span>
            <span style={{ color: "var(--brand-coral-bright)" }}>Geek</span>
          </span>
        </a>
        <nav className="proj-nav" style={{ display: "flex", gap: 28, fontSize: 14 }}>
          <a href="../index.html#servicios" style={{ color: "var(--fg-1)" }}>Servicios</a>
          <a href="../index.html#ia" style={{ color: "var(--fg-1)" }}>IA</a>
          <a href="../index.html#proceso" style={{ color: "var(--fg-1)" }}>Proceso</a>
          <a href="index.html" style={{ color: "var(--accent)" }}>Trabajo</a>
        </nav>
        <a href="../index.html#contacto" className="btn btn-primary proj-cta" style={{ padding: "10px 18px", fontSize: 14 }}>
          <span className="proj-cta-text">Cotiza tu proyecto</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
      </div>
    </header>
  );
}

function ProjectsIndex() {
  const items = window.GG_DATA.portfolio;
  return (
    <>
      <div className="noise" />
      <PageNav />
      <main style={{ paddingTop: 160, paddingBottom: 100 }}>
        <div className="container">
          <a href="../index.html" style={{ color: "var(--fg-2)", fontFamily: "var(--font-mono)", fontSize: 12, marginBottom: 24, display: "inline-flex", alignItems: "center", gap: 6 }}>
            ← Volver al inicio
          </a>
          <span className="eyebrow" style={{ display: "block", marginTop: 16 }}>/ Portafolio completo</span>
          <h1 style={{ marginTop: 16, maxWidth: 900 }}>
            Proyectos que <span style={{
              background: "linear-gradient(135deg, var(--brand-cyan-bright), var(--brand-coral-bright))",
              WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
            }}>generan resultados</span>.
          </h1>
          <p className="body-lg" style={{ marginTop: 24, maxWidth: 600 }}>
            {items.length} casos de éxito en marketplaces, SaaS, apps móviles, sitios corporativos y plataformas industriales.
          </p>

          <div style={{
            marginTop: 80,
            display: "grid",
            gridTemplateColumns: "repeat(3, 1fr)",
            gap: 16,
          }} className="all-projects-grid">
            {items.map((p, i) => {
              const accent = p.color === "coral" ? "var(--brand-coral-bright)" : "var(--brand-cyan-bright)";
              const glow = p.color === "coral" ? "rgba(255,107,126,0.3)" : "rgba(77,216,255,0.3)";
              return (
                <a key={p.id} href={`detalle.html?id=${p.id}`}
                  style={{
                    background: "var(--bg-1)",
                    border: "1px solid var(--line)",
                    borderRadius: "var(--r-lg)",
                    padding: 28,
                    display: "flex", flexDirection: "column", justifyContent: "space-between",
                    minHeight: 280, gap: 24,
                    position: "relative", overflow: "hidden",
                    transition: "all 240ms",
                  }}
                  onMouseEnter={(e) => { e.currentTarget.style.borderColor = accent; e.currentTarget.style.transform = "translateY(-3px)"; }}
                  onMouseLeave={(e) => { e.currentTarget.style.borderColor = "var(--line)"; e.currentTarget.style.transform = ""; }}
                >
                  <div style={{ position: "absolute", top: 0, right: 0, width: 200, height: 200, background: `radial-gradient(circle, ${glow}, transparent 70%)`, pointerEvents: "none" }} />
                  {/* screenshot thumbnail */}
                  <div style={{
                    position: "absolute", top: 16, right: 16, width: 150, height: 100,
                    borderRadius: 8, overflow: "hidden",
                    border: `1px solid ${accent}44`,
                    boxShadow: `0 4px 20px ${glow}`,
                    opacity: 0.8,
                  }}>
                    <div style={{ height: 16, background: "var(--bg-2)", display: "flex", alignItems: "center", gap: 4, padding: "0 6px", borderBottom: "1px solid var(--line)" }}>
                      {["#FF5F56","#FFBD2E","#27C93F"].map(c => (
                        <span key={c} style={{ width: 5, height: 5, borderRadius: "50%", background: c }} />
                      ))}
                    </div>
                    <img
                      src={`../assets/screenshots/${p.id}.jpg`}
                      alt={p.client}
                      style={{ width: "100%", height: "calc(100% - 16px)", objectFit: "cover", objectPosition: "top", display: "block" }}
                      onError={(e) => { e.target.parentElement.style.display = "none"; }}
                    />
                  </div>
                  <div style={{ position: "relative", zIndex: 1, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <span className="pill" style={{ borderColor: accent, color: accent }}>{p.tag}</span>
                    <span style={{ fontSize: 36, opacity: 0 }}>{p.emoji}</span>
                  </div>
                  <div style={{ position: "relative", zIndex: 1 }}>
                    <h3 style={{ fontSize: 22, marginBottom: 8 }}>{p.client}</h3>
                    <p className="body-sm" style={{ marginBottom: 16, fontSize: 13 }}>{p.desc}</p>
                    <div style={{ color: accent, fontFamily: "var(--font-mono)", fontSize: 11, display: "flex", alignItems: "center", gap: 6 }}>
                      Ver caso <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 17L17 7M8 7h9v9"/></svg>
                    </div>
                  </div>
                </a>
              );
            })}
          </div>
        </div>
      </main>
      <style>{`
        @media (max-width: 980px) { .all-projects-grid { grid-template-columns: repeat(2,1fr) !important; } }
        @media (max-width: 620px) { .all-projects-grid { grid-template-columns: 1fr !important; } }
        @media (max-width: 640px) {
          .proj-nav { display: none !important; }
          .proj-cta-text { display: none; }
          .proj-cta { padding: 10px 14px !important; }
        }
      `}</style>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ProjectsIndex />);
</script>
</body>
</html>
