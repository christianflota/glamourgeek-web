<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Casos de Éxito | GlamourGeek · Agencia Digital México</title>
<meta name="description" content="Casos de éxito de GlamourGeek: marketing digital, desarrollo web, apps y automatización con IA para empresas en México." />
<link rel="canonical" href="https://glamourgeek.com.mx/proyectos/" />

<!-- Open Graph (overridden dynamically per project) -->
<meta property="og:type" content="article" />
<meta property="og:site_name" content="GlamourGeek" />
<meta property="og:locale" content="es_MX" />
<meta property="og:title" content="Casos de Éxito | GlamourGeek" />
<meta property="og:description" content="Casos de éxito de GlamourGeek: marketing digital, desarrollo web, apps y automatización con IA." />
<meta property="og:image" content="https://glamourgeek.com.mx/assets/og-glamourgeek.jpg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Casos de Éxito | GlamourGeek" />
<meta name="twitter:description" content="Casos de éxito de GlamourGeek: marketing digital, desarrollo web, apps y automatización con IA." />
<meta name="twitter:image" content="https://glamourgeek.com.mx/assets/og-glamourgeek.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css" />
<link rel="icon" href="../assets/glamourgeek-isotipo.png" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../data.jsx"></script>
<script type="text/babel">
function Nav() {
  return (
    <header style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, padding: "20px 0" }}>
      <div style={{
        maxWidth: 1320, margin: "0 auto", padding: "12px 28px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        background: "rgba(12, 14, 20, 0.72)",
        backdropFilter: "blur(18px) saturate(140%)",
        border: "1px solid var(--line)",
        borderRadius: 999,
      }}>
        <a href="../index.html" style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <img src="../assets/glamourgeek-isotipo.png" alt="GlamourGeek" style={{ height: 32 }} />
          <span className="font-display" style={{ fontSize: 17, fontWeight: 700, display: "flex", gap: 4 }}>
            <span style={{ color: "var(--brand-cyan-bright)" }}>Glamour</span>
            <span style={{ color: "var(--brand-coral-bright)" }}>Geek</span>
          </span>
        </a>
        <a href="index.html" className="det-back" style={{ color: "var(--fg-1)", fontSize: 14, display: "flex", alignItems: "center", gap: 6 }}>← Todos los proyectos</a>
        <a href="../index.html#contacto" className="btn btn-primary det-cta" style={{ padding: "10px 18px", fontSize: 14 }}>
          <span className="det-cta-text">Cotiza tu proyecto</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
      </div>
    </header>
  );
}

function Detail() {
  let id = new URLSearchParams(window.location.search).get("id");
  if (!id) {
    const parts = window.location.pathname.split("/").filter(Boolean);
    id = parts[parts.length - 1];
    if (id === "detalle") id = null;
  }
  const items = window.GG_DATA.portfolio;
  const project = items.find(p => p.id === id) || items[0];
  const idx = items.findIndex(p => p.id === project.id);
  const next = items[(idx + 1) % items.length];
  const prev = items[(idx - 1 + items.length) % items.length];

  const accent = project.color === "coral" ? "var(--brand-coral-bright)" : "var(--brand-cyan-bright)";
  const glow = project.color === "coral" ? "rgba(255,107,126,0.4)" : "rgba(77,216,255,0.4)";

  React.useEffect(() => {
    const base = 'https://glamourgeek.com.mx';
    const url = `${base}/proyectos/${project.id}`;
    const img = `${base}/assets/screenshots/${project.id}.jpg`;
    const desc = `${project.client} · ${project.tag} — ${project.desc} Caso de éxito de GlamourGeek, agencia digital en México.`;

    document.title = `${project.client} · GlamourGeek | Agencia Digital México`;

    const setMeta = (sel, attr, val) => {
      let el = document.querySelector(sel);
      if (!el) { el = document.createElement('meta'); document.head.appendChild(el); }
      el.setAttribute(attr, val);
    };
    const setLink = (rel, href) => {
      let el = document.querySelector(`link[rel="${rel}"]`);
      if (!el) { el = document.createElement('link'); el.rel = rel; document.head.appendChild(el); }
      el.href = href;
    };

    setMeta('meta[name="description"]', 'content', desc);
    setLink('canonical', url);
    setMeta('meta[property="og:title"]', 'content', `${project.client} · GlamourGeek`);
    setMeta('meta[property="og:description"]', 'content', desc);
    setMeta('meta[property="og:url"]', 'content', url);
    setMeta('meta[property="og:image"]', 'content', img);
    setMeta('meta[name="twitter:title"]', 'content', `${project.client} · GlamourGeek`);
    setMeta('meta[name="twitter:description"]', 'content', desc);
    setMeta('meta[name="twitter:image"]', 'content', img);

    const ldJson = {
      "@context": "https://schema.org",
      "@type": "CreativeWork",
      "name": project.client,
      "description": project.longDesc,
      "url": project.url,
      "creator": { "@id": "https://glamourgeek.com.mx/#organization" },
      "keywords": project.services.join(', ')
    };
    let ldEl = document.getElementById('ld-project');
    if (!ldEl) { ldEl = document.createElement('script'); ldEl.id = 'ld-project'; ldEl.type = 'application/ld+json'; document.head.appendChild(ldEl); }
    ldEl.textContent = JSON.stringify(ldJson);
  }, [project]);

  return (
    <>
      <div className="noise" />
      <Nav />
      <main style={{ paddingTop: 140, paddingBottom: 80 }}>
        {/* HERO */}
        <section style={{ position: "relative", padding: "60px 0 80px", overflow: "hidden" }}>
          <div style={{
            position: "absolute", top: -100, right: -100, width: 600, height: 600,
            background: `radial-gradient(circle, ${glow}, transparent 60%)`,
            filter: "blur(40px)", pointerEvents: "none",
          }} />
          <div className="container" style={{ position: "relative", zIndex: 1 }}>
            <a href="index.html" style={{ color: "var(--fg-2)", fontFamily: "var(--font-mono)", fontSize: 12, display: "inline-flex", alignItems: "center", gap: 6, marginBottom: 32 }}>
              ← Portafolio
            </a>
            <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 24, flexWrap: "wrap" }}>
              <span className="pill" style={{ borderColor: accent, color: accent }}>{project.tag}</span>
              <span className="caption">{project.industry}</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 40, alignItems: "center" }} className="detail-hero">
              <h1 style={{ fontSize: "clamp(48px, 8vw, 96px)" }}>{project.client}</h1>
              <div style={{ fontSize: 120, lineHeight: 1 }} className="detail-emoji">{project.emoji}</div>
            </div>
            <p className="body-lg" style={{ marginTop: 32, maxWidth: 720 }}>{project.longDesc}</p>
            <div style={{ marginTop: 40, display: "flex", gap: 14, flexWrap: "wrap" }}>
              <a href={project.url} target="_blank" rel="noopener noreferrer" className="btn btn-primary">
                Visitar el sitio
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 17L17 7M8 7h9v9"/></svg>
              </a>
              <a href="../index.html#contacto" className="btn btn-ghost">Quiero algo similar</a>
            </div>
          </div>
        </section>

        {/* META */}
        <section style={{ padding: "40px 0", borderTop: "1px solid var(--line)", borderBottom: "1px solid var(--line)" }}>
          <div className="container" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 0 }} className="detail-meta">
            <Meta label="Cliente" value={project.client} />
            <Meta label="Industria" value={project.industry} border />
            <Meta label="Servicios" value={project.services.join(" · ")} border />
          </div>
        </section>

        {/* VALOR */}
        <section style={{ padding: "100px 0" }}>
          <div className="container">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1.2fr", gap: 80 }} className="detail-value">
              <div>
                <span className="eyebrow">/ Valor generado</span>
                <h2 style={{ marginTop: 16 }}>Resultados que importan.</h2>
                <p className="body" style={{ marginTop: 20, maxWidth: 360 }}>
                  Este proyecto no fue solo entregar pixeles — fue resolver un problema de negocio.
                </p>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {project.value.map((v, i) => (
                  <div key={i} style={{
                    padding: "24px 28px",
                    background: "var(--bg-1)",
                    border: "1px solid var(--line)",
                    borderRadius: "var(--r-md)",
                    display: "flex", gap: 20, alignItems: "center",
                  }}>
                    <span className="font-mono" style={{ color: accent, fontSize: 13 }}>0{i+1}</span>
                    <span className="font-display" style={{ fontSize: 18, fontWeight: 600 }}>{v}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>

        {/* PREVIEW IFRAME-LIKE */}
        <section style={{ padding: "60px 0 100px" }}>
          <div className="container">
            <div style={{
              borderRadius: "var(--r-lg)",
              overflow: "hidden",
              border: "1px solid var(--line-strong)",
              background: "var(--bg-1)",
              position: "relative",
            }}>
              {/* browser chrome */}
              <div style={{
                padding: "12px 18px",
                borderBottom: "1px solid var(--line)",
                display: "flex", alignItems: "center", gap: 12,
                background: "var(--bg-2)",
              }}>
                <div style={{ display: "flex", gap: 6 }}>
                  {["#FF5F56","#FFBD2E","#27C93F"].map(c => (
                    <span key={c} style={{ width: 11, height: 11, borderRadius: "50%", background: c }} />
                  ))}
                </div>
                <div style={{
                  flex: 1, padding: "5px 14px",
                  background: "var(--bg-3)", borderRadius: 6,
                  fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--fg-2)",
                  textAlign: "center",
                }}>{project.url.replace(/^https?:\/\//, "")}</div>
              </div>
              <div style={{ aspectRatio: "16/9", position: "relative", overflow: "hidden" }}>
                <img
                  src={`../assets/screenshots/${project.id}.jpg`}
                  alt={`${project.client} screenshot`}
                  style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "top", display: "block" }}
                  onError={(e) => {
                    e.target.style.display = "none";
                    e.target.nextSibling.style.display = "flex";
                  }}
                />
                <div style={{
                  display: "none", position: "absolute", inset: 0,
                  background: `radial-gradient(circle at 30% 30%, ${glow}, transparent 60%), linear-gradient(135deg, var(--bg-1), var(--bg-2))`,
                  alignItems: "center", justifyContent: "center", textAlign: "center",
                }}>
                  <div>
                    <div style={{ fontSize: 80, marginBottom: 16 }}>{project.emoji}</div>
                    <div className="font-display" style={{ fontSize: 32, fontWeight: 700 }}>{project.client}</div>
                    <a href={project.url} target="_blank" rel="noopener noreferrer" style={{
                      color: accent, fontFamily: "var(--font-mono)", fontSize: 13,
                      display: "inline-flex", alignItems: "center", gap: 6, marginTop: 12,
                    }}>Ir al sitio en vivo →</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        {/* NEXT/PREV */}
        <section style={{ padding: "60px 0", borderTop: "1px solid var(--line)" }}>
          <div className="container" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }} className="detail-nav">
            <ProjectNavCard project={prev} dir="prev" />
            <ProjectNavCard project={next} dir="next" />
          </div>
        </section>
      </main>

      <PageFooter />

      <style>{`
        @media (max-width: 720px) {
          .detail-hero { grid-template-columns: 1fr !important; }
          .detail-emoji { font-size: 80px !important; }
          .detail-meta { grid-template-columns: 1fr !important; }
          .detail-meta > div + div { border-top: 1px solid var(--line) !important; border-left: none !important; padding-top: 24px; margin-top: 12px; }
          .detail-value { grid-template-columns: 1fr !important; gap: 40px !important; }
          .detail-nav { grid-template-columns: 1fr !important; }
        }
        @media (max-width: 640px) {
          .det-back { display: none !important; }
          .det-cta-text { display: none; }
          .det-cta { padding: 10px 14px !important; }
        }
      `}</style>
    </>
  );
}

function Meta({ label, value, border }) {
  return (
    <div style={{ padding: "0 32px", borderLeft: border ? "1px solid var(--line)" : "none" }}>
      <div className="caption" style={{ color: "var(--fg-3)" }}>{label}</div>
      <div className="font-display" style={{ fontSize: 18, fontWeight: 600, marginTop: 8 }}>{value}</div>
    </div>
  );
}

function ProjectNavCard({ project, dir }) {
  const accent = project.color === "coral" ? "var(--brand-coral-bright)" : "var(--brand-cyan-bright)";
  return (
    <a href={`/proyectos/${project.id}`} style={{
      padding: 28,
      background: "var(--bg-1)",
      border: "1px solid var(--line)",
      borderRadius: "var(--r-lg)",
      display: "flex", flexDirection: "column", gap: 12,
      textAlign: dir === "prev" ? "left" : "right",
      transition: "all 240ms",
    }}
    onMouseEnter={(e) => e.currentTarget.style.borderColor = accent}
    onMouseLeave={(e) => e.currentTarget.style.borderColor = "var(--line)"}>
      <div className="caption" style={{ color: "var(--fg-3)" }}>{dir === "prev" ? "← Anterior" : "Siguiente →"}</div>
      <div style={{ display: "flex", alignItems: "center", gap: 16, justifyContent: dir === "prev" ? "flex-start" : "flex-end" }}>
        {dir === "prev" && <span style={{ fontSize: 36 }}>{project.emoji}</span>}
        <div>
          <h3 style={{ fontSize: 22 }}>{project.client}</h3>
          <p className="caption" style={{ marginTop: 4 }}>{project.tag}</p>
        </div>
        {dir === "next" && <span style={{ fontSize: 36 }}>{project.emoji}</span>}
      </div>
    </a>
  );
}

function PageFooter() {
  return (
    <footer style={{ padding: "60px 0 40px", borderTop: "1px solid var(--line)" }}>
      <div className="container">
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 40, marginBottom: 48 }} className="page-footer-grid">
          <div>
            <a href="/" style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, textDecoration: "none" }}>
              <img src="../assets/glamourgeek-isotipo.png" alt="GG" style={{ height: 36 }} />
              <span style={{ fontSize: 18, fontWeight: 700, fontFamily: "var(--font-display)", display: "flex", gap: 4 }}>
                <span style={{ color: "var(--brand-cyan-bright)" }}>Glamour</span>
                <span style={{ color: "var(--brand-coral-bright)" }}>Geek</span>
              </span>
            </a>
            <p style={{ maxWidth: 300, color: "var(--fg-1)", fontSize: 14, lineHeight: 1.6, marginBottom: 24 }}>
              Marketing digital + desarrollo de software. Cancún, México · Trabajamos remoto.
            </p>
            <a href="/#contacto" className="btn btn-primary" style={{ fontSize: 13, padding: "10px 20px", display: "inline-flex" }}>
              Cotiza tu proyecto →
            </a>
          </div>
          <div>
            <p style={{ marginBottom: 16, color: "var(--fg-2)", fontSize: 11, fontFamily: "var(--font-mono)", letterSpacing: "0.1em", textTransform: "uppercase" }}>Servicios</p>
            {[
              ["/servicios/marketing","Marketing Digital"],
              ["/servicios/web","Desarrollo Web"],
              ["/servicios/apps","Apps iOS/Android"],
              ["/servicios/ecommerce","E-Commerce"],
              ["/servicios/seo","SEO"],
              ["/servicios/ppc","Campañas PPC"],
              ["/servicios/social","Redes Sociales"],
              ["/servicios/ia","Agencia de IA"],
            ].map(([href, label]) => (
              <a key={label} href={href} style={{ display: "block", marginBottom: 10, color: "var(--fg-1)", textDecoration: "none", fontSize: 14, transition: "color 200ms" }}
                onMouseEnter={(e) => (e.currentTarget.style.color = "var(--accent)")}
                onMouseLeave={(e) => (e.currentTarget.style.color = "var(--fg-1)")}
              >{label}</a>
            ))}
          </div>
          <div>
            <p style={{ marginBottom: 16, color: "var(--fg-2)", fontSize: 11, fontFamily: "var(--font-mono)", letterSpacing: "0.1em", textTransform: "uppercase" }}>Empresa</p>
            {[
              ["/","Inicio"],
              ["/nosotros","Nosotros"],
              ["/#proceso","Proceso"],
              ["/#portafolio","Portafolio"],
              ["/#faq","FAQ"],
              ["/#contacto","Contacto"],
            ].map(([href, label]) => (
              <a key={label} href={href} style={{ display: "block", marginBottom: 10, color: "var(--fg-1)", textDecoration: "none", fontSize: 14, transition: "color 200ms" }}
                onMouseEnter={(e) => (e.currentTarget.style.color = "var(--accent)")}
                onMouseLeave={(e) => (e.currentTarget.style.color = "var(--fg-1)")}
              >{label}</a>
            ))}
          </div>
          <div>
            <p style={{ marginBottom: 16, color: "var(--fg-2)", fontSize: 11, fontFamily: "var(--font-mono)", letterSpacing: "0.1em", textTransform: "uppercase" }}>Síguenos</p>
            {[
              ["Instagram","https://www.instagram.com/glamourgeekmx/"],
              ["Facebook","https://www.facebook.com/GlamourGeekMX/"],
              ["WhatsApp","https://wa.me/529982416655"],
              ["Email","mailto:hola@glamourgeek.com.mx"],
            ].map(([label, href]) => (
              <a key={label} href={href}
                target={href.startsWith("http") ? "_blank" : undefined}
                rel={href.startsWith("http") ? "noopener noreferrer" : undefined}
                style={{ display: "block", marginBottom: 10, color: "var(--fg-1)", textDecoration: "none", fontSize: 14, transition: "color 200ms" }}
                onMouseEnter={(e) => (e.currentTarget.style.color = "var(--accent)")}
                onMouseLeave={(e) => (e.currentTarget.style.color = "var(--fg-1)")}
              >{label}</a>
            ))}
          </div>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 24, borderTop: "1px solid var(--line)", flexWrap: "wrap", gap: 16 }}>
          <p style={{ fontSize: 12, fontFamily: "var(--font-mono)", color: "var(--fg-3)" }}>© 2026 GlamourGeek. Todos los derechos reservados.</p>
          <div style={{ display: "flex", gap: 12 }}>
            {[
              ["https://www.instagram.com/glamourgeekmx/","IG"],
              ["https://www.facebook.com/GlamourGeekMX/","FB"],
              ["https://wa.me/529982416655","WA"],
            ].map(([href, label]) => (
              <a key={label} href={href} target="_blank" rel="noopener noreferrer" style={{
                width: 36, height: 36, borderRadius: "50%",
                border: "1px solid var(--line-strong)",
                display: "flex", alignItems: "center", justifyContent: "center",
                color: "var(--fg-1)", transition: "all 200ms", textDecoration: "none",
                fontSize: 10, fontFamily: "var(--font-mono)", fontWeight: 600,
              }}
                onMouseEnter={(e) => { e.currentTarget.style.borderColor = "var(--accent)"; e.currentTarget.style.color = "var(--accent)"; }}
                onMouseLeave={(e) => { e.currentTarget.style.borderColor = "var(--line-strong)"; e.currentTarget.style.color = "var(--fg-1)"; }}
              >{label}</a>
            ))}
          </div>
        </div>
      </div>
      <style>{`
        @media (max-width: 760px) { .page-footer-grid { grid-template-columns: 1fr 1fr !important; } }
        @media (max-width: 480px) { .page-footer-grid { grid-template-columns: 1fr !important; } }
      `}</style>
    </footer>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Detail />);
</script>
</body>
</html>
