<script type="text/babel">

      <div style={{

function AIServicePage() {
  let id = new URLSearchParams(window.location.search).get("id");
  if (!id) {
    const parts = window.location.pathname.split("/").filter(Boolean);
    id = parts[parts.length - 1];
    if (id === "ia") id = null;
  }
  const service = window.GG_DATA.aiServices.find(s => s.id === id);

  useEffect(() => {
    if (!service) return;
    const base = "https://glamourgeek.com.mx";
    const url = `${base}/servicios/ia/${service.id}`;

    document.title = service.metaTitle;

    const setMeta = (sel, attr, val) => {
      let el = document.querySelector(sel);
      if (!el) { el = document.createElement("meta"); document.head.appendChild(el); }
      el.setAttribute(attr, val);
    };
    const setLink = (rel, href) => {
      let el = document.querySelector(`link[rel="${rel}"]`);
      if (!el) { el = document.createElement("link"); el.rel = rel; document.head.appendChild(el); }
      el.href = href;
    };

    setMeta('meta[name="description"]', "content", service.metaDesc);
    setLink("canonical", url);
    setMeta('meta[property="og:title"]', "content", service.metaTitle);
    setMeta('meta[property="og:description"]', "content", service.metaDesc);
    setMeta('meta[property="og:url"]', "content", url);
    setMeta('meta[name="twitter:title"]', "content", service.metaTitle);
    setMeta('meta[name="twitter:description"]', "content", service.metaDesc);

    const existing = document.getElementById("ld-ia-service");
    if (existing) existing.remove();
    const script = document.createElement("script");
    script.id = "ld-ia-service";
    script.type = "application/ld+json";
    script.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "Service",
      "@id": url,
      "name": service.title,
      "description": service.metaDesc,
      "url": url,
      "provider": { "@type": "Organization", "@id": "https://glamourgeek.com.mx/#organization", "name": "GlamourGeek" },

      "areaServed": { "@type": "Country", "name": "México" },
      "serviceType": service.title,
      "category": "Inteligencia Artificial",
      "inLanguage": "es-MX"
    });
    document.head.appendChild(script);
  }, [service]);

  if (!service) {
    return (
      <>
        <div className="noise" />
        <PageNav />
        <main style={{ paddingTop: 200, paddingBottom: 100, textAlign: "center" }}>
          <div className="container">
            <h1>Servicio no encontrado</h1>
            <a href="../index.html#ia" className="btn btn-primary" style={{ marginTop: 32, display: "inline-flex" }}>Ver servicios de IA</a>
          </div>
        </main>
      </>
    );
  }

  const otherServices = window.GG_DATA.aiServices.filter(s => s.id !== service.id).slice(0, 3);

      <PageNav />

      {/* HERO */}
      <section style={{ paddingTop: 160, paddingBottom: 100, position: "relative", overflow: "hidden" }}>

            radial-gradient(ellipse at 20% 50%, rgba(77,216,255,0.12), transparent 50%),
            radial-gradient(ellipse at 80% 50%, rgba(255,107,126,0.12), transparent 50%)
          `,
          pointerEvents: "none",
        }} />
        {/* grid bg */}
        <div style={{
          position: "absolute", inset: 0,
          backgroundImage: "linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px)",
          backgroundSize: "60px 60px",
          maskImage: "radial-gradient(ellipse at 50% 0%, black 30%, transparent 70%)",
          WebkitMaskImage: "radial-gradient(ellipse at 50% 0%, black 30%, transparent 70%)",
          opacity: 0.4, pointerEvents: "none",

            ← Todos los servicios de IA
          </a>
          <div style={{ display: "flex", alignItems: "center", gap: 16, marginTop: 24, marginBottom: 20 }}>
            <div style={{
              width: 64, height: 64, borderRadius: 16,
              background: "linear-gradient(135deg, rgba(77,216,255,0.2), rgba(255,107,126,0.2))",
              border: "1px solid rgba(77,216,255,0.3)",
              display: "flex", alignItems: "center", justifyContent: "center",
              color: "var(--brand-cyan-bright)",
            }}>

            <span className="pill" style={{
              background: "linear-gradient(135deg, var(--brand-cyan-bright), var(--brand-coral-bright))",

          </h1>
          <p className="body-lg" style={{ marginTop: 24, maxWidth: 640 }}>{service.longDesc}</p>
          <div style={{ display: "flex", gap: 16, marginTop: 40, flexWrap: "wrap" }}>
            <a href="../index.html#contacto" className="btn btn-primary">
              Cotiza este servicio
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
            </a>
            <a href="../index.html#contacto" className="btn btn-ghost">Agendar diagnóstico gratis</a>
          </div>
        </div>
      </section>

      {/* BENEFITS BAR */}
      <div style={{ borderTop: "1px solid var(--line)", borderBottom: "1px solid var(--line)", background: "var(--bg-1)" }}>
        <div className="container" style={{ padding: "28px 0" }}>

              <div key={b} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 14 }}>

                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 7"/></svg>

                <span style={{ color: "var(--fg-1)" }}>{b}</span>
              </div>
            ))}

      </div>

      {/* FEATURES */}
      <section style={{ padding: "100px 0", borderBottom: "1px solid var(--line)" }}>

          }} className="ia-features-grid">
            {service.features.map((f, i) => (
              <div key={f.title} style={{ background: "var(--bg-1)", padding: "36px 32px", position: "relative", overflow: "hidden" }}>

                  position: "absolute", top: 0, right: 0, width: 120, height: 120,
                  background: "radial-gradient(circle, rgba(77,216,255,0.08), transparent 70%)",
                  pointerEvents: "none",
                }} />
                <div style={{

                  background: "linear-gradient(135deg, rgba(77,216,255,0.15), rgba(255,107,126,0.15))",
                  border: "1px solid rgba(77,216,255,0.3)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  color: "var(--brand-cyan-bright)", marginBottom: 20,

                <p className="body-sm" style={{ color: "var(--fg-1)" }}>{f.desc}</p>

          </div>

      </section>

      {/* TECH STACK */}
      <section style={{ padding: "60px 0", borderBottom: "1px solid var(--line)", background: "var(--bg-1)" }}>
        <div className="container" style={{ textAlign: "center" }}>
          <p className="caption" style={{ marginBottom: 24 }}>Tecnologías que usamos</p>
          <div style={{ display: "flex", gap: 16, flexWrap: "wrap", justifyContent: "center" }}>
            {["OpenAI GPT-4o", "Anthropic Claude", "n8n", "Make / Zapier", "WhatsApp API", "HubSpot", "Kommo CRM", "Google Gemini"].map((t) => (
              <span key={t} style={{
                padding: "8px 16px", borderRadius: 999,
                border: "1px solid var(--line-strong)",
                fontFamily: "var(--font-mono)", fontSize: 12,
                color: "var(--fg-1)", background: "rgba(77,216,255,0.04)",
              }}>{t}</span>
            ))}
          </div>
        </div>
      </section>

      {/* FAQ */}
      <section style={{ padding: "100px 0", borderBottom: "1px solid var(--line)" }}>
        <div className="container">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 80, alignItems: "start" }} className="ia-faq-grid">
            <div style={{ position: "sticky", top: 120 }}>
              <span className="eyebrow">/ Preguntas frecuentes</span>
              <h2 style={{ marginTop: 16 }}>Lo que más nos preguntan sobre {service.title}.</h2>
              <p className="body" style={{ marginTop: 24, color: "var(--fg-1)" }}>¿Tienes otra pregunta? Escríbenos.</p>
              <a href="../index.html#contacto" className="btn btn-ghost" style={{ marginTop: 32 }}>
                Hacer una pregunta
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 17L17 7M8 7h9v9"/></svg>

            </div>
            <div style={{ display: "flex", flexDirection: "column" }}>
              {service.faq.map((item, i) => (
                <FAQItem key={i} q={item.q} a={item.a} last={i === service.faq.length - 1} />
              ))}
            </div>
          </div>
        </div>
        <style>{`@media (max-width: 900px) { .ia-faq-grid { grid-template-columns: 1fr !important; gap: 48px !important; } .ia-faq-grid > div:first-child { position: static !important; } }`}</style>

      {/* CTA */}

          pointerEvents: "none",
        }} />
        <div className="container" style={{ position: "relative", zIndex: 1 }}>

          <h2 style={{ marginTop: 16, marginBottom: 24 }}>¿Listo para implementar IA?</h2>

              Cotizar ahora
            </a>

        </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }} className="other-ia-grid">
            {otherServices.map((s) => (
              <a key={s.id} href={`/servicios/ia/${s.id}`}
                style={{
                  background: "var(--bg-1)", border: "1px solid var(--line)",
                  borderRadius: "var(--r-lg)", padding: "28px 24px",
                  display: "flex", flexDirection: "column", gap: 12, transition: "all 240ms",
                  textDecoration: "none", color: "inherit",
                }}
                onMouseEnter={(e) => { e.currentTarget.style.borderColor = "var(--brand-cyan-bright)"; e.currentTarget.style.transform = "translateY(-3px)"; }}
                onMouseLeave={(e) => { e.currentTarget.style.borderColor = "var(--line)"; e.currentTarget.style.transform = ""; }}
              >
                <div style={{ color: "var(--brand-cyan-bright)" }}>{AI_ICONS[s.icon]}</div>
                <div>
                  <h3 style={{ fontSize: 18, marginBottom: 6 }}>{s.title}</h3>
                  <p className="body-sm" style={{ color: "var(--fg-1)" }}>{s.tagline}</p>
                </div>
              </a>
            ))}
          </div>
        </div>
        <style>{`
          @media (max-width: 760px) { .other-ia-grid { grid-template-columns: 1fr !important; } }
          @media (max-width: 900px) { .ia-features-grid { grid-template-columns: repeat(2,1fr) !important; } }

          @media (max-width: 640px) { .ia-nav { display: none !important; } .ia-cta-text { display: none; } .ia-cta { padding: 10px 14px !important; } }
        `}</style>
      </section>

      <PageFooter />
    </>
  );
}

      <style>{`
        @media (max-width: 640px) {
          .page-footer-grid { grid-template-columns: 1fr 1fr !important; }
          .page-footer-grid > div:first-child { grid-column: span 2; }
        }
      `}</style>
    </footer>
  );
}

function FAQItem({ q, a, last }) {
  const [open, setOpen] = useState(false);
  return (
    <div onClick={() => setOpen(!open)} style={{ borderTop: "1px solid var(--line)", borderBottom: last ? "1px solid var(--line)" : "none", padding: "24px 0", cursor: "pointer" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 16 }}>
        <h3 style={{ fontSize: 17, fontWeight: 600, flex: 1 }}>{q}</h3>
        <span style={{ color: "var(--brand-cyan-bright)", flexShrink: 0, transition: "transform 240ms", transform: open ? "rotate(45deg)" : "rotate(0deg)" }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </span>
      </div>
      <div style={{ maxHeight: open ? 300 : 0, overflow: "hidden", opacity: open ? 1 : 0, transition: "all 280ms ease" }}>
        <p className="body-sm" style={{ marginTop: 14, color: "var(--fg-1)" }}>{a}</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AIServicePage />);
</script>
</body>
</html>
