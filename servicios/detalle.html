<body>

<script type="text/babel" src="../data.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const SERVICE_ICONS = {
  rocket: (
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <path d="M4.5 16.5c-1.5 1.5-2 5-2 5s3.5-.5 5-2c.85-.85.85-2.15 0-3-.85-.85-2.15-.85-3 0Z" />
      <path d="M12 15l-3-3a22 22 0 0 1 8-11 9 9 0 0 1 4 4 22 22 0 0 1-11 8l3-3" />
    </svg>
  ),
  code: (
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <path d="M16 18l6-6-6-6M8 6l-6 6 6 6" />
    </svg>
  ),
  globe: (
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="10" /><path d="M2 12h20" />
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
    </svg>
  ),
  search: (
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="11" cy="11" r="7" /><path d="M21 21l-4.3-4.3" />
    </svg>
  ),
  cart: (
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="9" cy="21" r="1.5" /><circle cx="18" cy="21" r="1.5" />
      <path d="M3 3h2l2.7 13.4a2 2 0 0 0 2 1.6h8.6a2 2 0 0 0 2-1.6L23 7H6" />
    </svg>
  ),
  phone: (
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <rect x="6" y="2" width="12" height="20" rx="2.5" /><path d="M11 18h2" />
    </svg>
  ),
  chart: (
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 3v18h18M7 14l4-4 4 4 5-6" />
    </svg>
  ),
  social: (
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="18" cy="5" r="3" /><circle cx="6" cy="12" r="3" /><circle cx="18" cy="19" r="3" />
      <path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4" />
    </svg>
  ),
  camera: (
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 7h3l2-3h8l2 3h3a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1z" />
      <circle cx="12" cy="13" r="4" />
    </svg>
  ),
};

function PageNav() {
  return (
    <header style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, padding: "20px 0" }}>
      <div style={{
        maxWidth: 1320, margin: "0 auto", padding: "12px 28px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        background: "rgba(12, 14, 20, 0.72)",
        backdropFilter: "blur(18px) saturate(140%)",
        WebkitBackdropFilter: "blur(18px) saturate(140%)",
        border: "1px solid var(--line)",
        borderRadius: 999,
      }}>
        <a href="../index.html" style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <img src="../assets/glamourgeek-isotipo.png" alt="GlamourGeek" style={{ height: 32 }} />
          <span className="font-display" style={{ fontSize: 17, fontWeight: 700, letterSpacing: "-0.02em", display: "flex", gap: 4 }}>
            <span style={{ color: "var(--brand-cyan-bright)" }}>Glamour</span>
            <span style={{ color: "var(--brand-coral-bright)" }}>Geek</span>
          </span>
        </a>
        <nav className="svc-nav" style={{ display: "flex", gap: 28, fontSize: 14 }}>
          <a href="../index.html#servicios" style={{ color: "var(--accent)" }}>Servicios</a>
          <a href="../index.html#ia" style={{ color: "var(--fg-1)" }}>IA</a>
          <a href="../index.html#proceso" style={{ color: "var(--fg-1)" }}>Proceso</a>
          <a href="../proyectos/" style={{ color: "var(--fg-1)" }}>Trabajo</a>
        </nav>
        <a href="../index.html#contacto" className="btn btn-primary svc-cta" style={{ padding: "10px 18px", fontSize: 14 }}>
          <span className="svc-cta-text">Cotiza tu proyecto</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
      </div>
    </header>
  );
}

function ServicePage() {
  let id = new URLSearchParams(window.location.search).get("id");
  if (!id) {
    const parts = window.location.pathname.split("/").filter(Boolean);
    id = parts[parts.length - 1];
    if (id === "detalle") id = null;
  }
  const service = window.GG_DATA.services.find(s => s.id === id);

  useEffect(() => {
    if (!service) return;
    const base = "https://glamourgeek.com.mx";
    const url = `${base}/servicios/${service.id}`;

    document.title = service.metaTitle;

    const setMeta = (sel, attr, val) => {
      let el = document.querySelector(sel);
      if (!el) { el = document.createElement("meta"); document.head.appendChild(el); }
      el.setAttribute(attr, val);
    };
    const setLink = (rel, href) => {
      let el = document.querySelector(`link[rel="${rel}"]`);
      if (!el) { el = document.createElement("link"); el.rel = rel; document.head.appendChild(el); }
      el.href = href;
    };

    setMeta('meta[name="description"]', "content", service.metaDesc);
    setLink("canonical", url);
    setMeta('meta[property="og:title"]', "content", service.metaTitle);
    setMeta('meta[property="og:description"]', "content", service.metaDesc);
    setMeta('meta[property="og:url"]', "content", url);
    setMeta('meta[name="twitter:title"]', "content", service.metaTitle);
    setMeta('meta[name="twitter:description"]', "content", service.metaDesc);

    // JSON-LD Service schema
    const existing = document.getElementById("ld-service");
    if (existing) existing.remove();
    const script = document.createElement("script");
    script.id = "ld-service";
    script.type = "application/ld+json";
    script.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "Service",
      "@id": url,
      "name": service.title,
      "description": service.metaDesc,
      "url": url,
      "provider": {
        "@type": "Organization",
        "@id": "https://glamourgeek.com.mx/#organization",
        "name": "GlamourGeek",
        "url": "https://glamourgeek.com.mx"
      },
      "areaServed": { "@type": "Country", "name": "México" },
      "serviceType": service.title,
      "inLanguage": "es-MX"
    });
    document.head.appendChild(script);
  }, [service]);

  if (!service) {
    return (
      <>
        <div className="noise" />
        <PageNav />
        <main style={{ paddingTop: 200, paddingBottom: 100, textAlign: "center" }}>
          <div className="container">
            <h1>Servicio no encontrado</h1>
            <a href="../index.html#servicios" className="btn btn-primary" style={{ marginTop: 32, display: "inline-flex" }}>Ver todos los servicios</a>
          </div>
        </main>
      </>
    );
  }

  const accent = service.color === "coral" ? "var(--brand-coral-bright)" : "var(--brand-cyan-bright)";
  const glow = service.color === "coral" ? "rgba(255,107,126,0.25)" : "rgba(77,216,255,0.25)";
  const otherServices = window.GG_DATA.services.filter(s => s.id !== service.id).slice(0, 3);

  return (
    <>
      <div className="noise" />
      <PageNav />

      {/* HERO */}
      <section style={{ paddingTop: 160, paddingBottom: 100, position: "relative", overflow: "hidden" }}>
        <div style={{
          position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)",
          width: 800, height: 500,
          background: `radial-gradient(ellipse at 50% 0%, ${glow}, transparent 70%)`,
          pointerEvents: "none",
        }} />
        <div className="container" style={{ position: "relative", zIndex: 1 }}>
          <a href="../index.html#servicios" style={{ color: "var(--fg-2)", fontFamily: "var(--font-mono)", fontSize: 12, marginBottom: 24, display: "inline-flex", alignItems: "center", gap: 6 }}>
            ← Todos los servicios
          </a>
          <div style={{ display: "flex", alignItems: "center", gap: 16, marginTop: 24, marginBottom: 20 }}>
            <div style={{
              width: 64, height: 64, borderRadius: 16,
              border: `1px solid ${accent}55`,
              display: "flex", alignItems: "center", justifyContent: "center",
              color: accent,
              background: `linear-gradient(135deg, ${glow}, transparent)`,
            }}>
              {SERVICE_ICONS[service.icon]}
            </div>
            <span className="eyebrow">/ {service.num} — {service.title}</span>
          </div>
          <h1 style={{ maxWidth: 860 }}>
            <span style={{
              background: `linear-gradient(135deg, ${accent}, var(--fg-0))`,
              WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
            }}>{service.heroTagline}</span>
          </h1>
          <p className="body-lg" style={{ marginTop: 24, maxWidth: 640 }}>{service.longDesc}</p>
          <div style={{ display: "flex", gap: 16, marginTop: 40, flexWrap: "wrap" }}>
            <a href="../index.html#contacto" className="btn btn-primary">
              Cotiza este servicio
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
            </a>
            <a href="../index.html#contacto" className="btn btn-ghost">Agendar llamada</a>
          </div>
        </div>
      </section>

      {/* BENEFITS BAR */}
      <div style={{ borderTop: "1px solid var(--line)", borderBottom: "1px solid var(--line)", background: "var(--bg-1)" }}>
        <div className="container" style={{ padding: "28px 0" }}>
          <div style={{ display: "flex", gap: 40, flexWrap: "wrap", justifyContent: "center" }}>
            {service.benefits.map((b) => (
              <div key={b} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 14 }}>
                <span style={{ color: accent }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 7"/></svg>
                </span>
                <span style={{ color: "var(--fg-1)" }}>{b}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* FEATURES */}
      <section style={{ padding: "100px 0", borderBottom: "1px solid var(--line)" }}>
        <div className="container">
          <span className="eyebrow">/ Lo que incluye</span>
          <h2 style={{ marginTop: 16, marginBottom: 64, maxWidth: 600 }}>Todo lo que necesitas, sin extras ocultos.</h2>
          <div style={{
            display: "grid",
            gridTemplateColumns: "repeat(3, 1fr)",
            gap: 1,
            background: "var(--line)",
            border: "1px solid var(--line)",
            borderRadius: "var(--r-lg)",
            overflow: "hidden",
          }} className="features-grid">
            {service.features.map((f, i) => (
              <div key={f.title} style={{
                background: "var(--bg-1)",
                padding: "36px 32px",
                position: "relative",
              }}>
                <div style={{
                  width: 36, height: 36, borderRadius: 10,
                  background: `linear-gradient(135deg, ${glow}, transparent)`,
                  border: `1px solid ${accent}44`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  color: accent, marginBottom: 20, fontSize: 14, fontFamily: "var(--font-mono)", fontWeight: 600,
                }}>
                  {String(i + 1).padStart(2, "0")}
                </div>
                <h3 style={{ fontSize: 18, marginBottom: 10 }}>{f.title}</h3>
                <p className="body-sm" style={{ color: "var(--fg-1)" }}>{f.desc}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* FAQ */}
      <section style={{ padding: "100px 0", borderBottom: "1px solid var(--line)" }}>
        <div className="container">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 80, alignItems: "start" }} className="svc-faq-grid">
            <div style={{ position: "sticky", top: 120 }}>
              <span className="eyebrow">/ Preguntas frecuentes</span>
              <h2 style={{ marginTop: 16 }}>Lo que más nos preguntan sobre {service.title}.</h2>
              <p className="body" style={{ marginTop: 24, color: "var(--fg-1)" }}>
                ¿Tienes otra pregunta? Escríbenos y te respondemos en menos de 24 horas.
              </p>
              <a href="../index.html#contacto" className="btn btn-ghost" style={{ marginTop: 32 }}>
                Hacer una pregunta
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 17L17 7M8 7h9v9"/></svg>
              </a>
            </div>
            <div style={{ display: "flex", flexDirection: "column" }}>
              {service.faq.map((item, i) => (
                <FAQItem key={i} q={item.q} a={item.a} accent={accent} last={i === service.faq.length - 1} />
              ))}
            </div>
          </div>
        </div>
        <style>{`@media (max-width: 900px) { .svc-faq-grid { grid-template-columns: 1fr !important; gap: 48px !important; } .svc-faq-grid > div:first-child { position: static !important; } }`}</style>
      </section>

      {/* CTA */}
      <section style={{ padding: "120px 0", textAlign: "center", position: "relative", overflow: "hidden" }}>
        <div style={{
          position: "absolute", inset: 0,
          background: `radial-gradient(ellipse at 50% 100%, ${glow}, transparent 70%)`,
          pointerEvents: "none",
        }} />
        <div className="container" style={{ position: "relative", zIndex: 1 }}>
          <span className="eyebrow">/ Siguiente paso</span>
          <h2 style={{ marginTop: 16, marginBottom: 24 }}>¿Listo para empezar?</h2>
          <p className="body-lg" style={{ maxWidth: 520, margin: "0 auto 48px" }}>
            Cuéntanos tu proyecto y te respondemos con un estimado en menos de 24 horas. Sin compromisos.
          </p>
          <a href="../index.html#contacto" className="btn btn-primary" style={{ fontSize: 17, padding: "16px 36px" }}>
            Cotiza {service.title}
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </a>
        </div>
      </section>

      {/* OTROS SERVICIOS */}
      <section style={{ padding: "80px 0", borderTop: "1px solid var(--line)" }}>
        <div className="container">
          <span className="eyebrow" style={{ marginBottom: 40, display: "block" }}>/ También trabajamos en</span>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }} className="other-svc-grid">
            {otherServices.map((s) => {
              const a2 = s.color === "coral" ? "var(--brand-coral-bright)" : "var(--brand-cyan-bright)";
              return (
                <a key={s.id} href={`/servicios/${s.id}`}
                  style={{
                    background: "var(--bg-1)", border: "1px solid var(--line)",
                    borderRadius: "var(--r-lg)", padding: "28px 24px",
                    display: "flex", flexDirection: "column", gap: 12, transition: "all 240ms",
                  }}
                  onMouseEnter={(e) => { e.currentTarget.style.borderColor = a2; e.currentTarget.style.transform = "translateY(-3px)"; }}
                  onMouseLeave={(e) => { e.currentTarget.style.borderColor = "var(--line)"; e.currentTarget.style.transform = ""; }}
                >
                  <div style={{ color: a2 }}>{SERVICE_ICONS[s.icon]}</div>
                  <div>
                    <h3 style={{ fontSize: 18, marginBottom: 6 }}>{s.title}</h3>
                    <p className="body-sm" style={{ color: "var(--fg-1)" }}>{s.tagline}</p>
                  </div>
                </a>
              );
            })}
          </div>
        </div>
        <style>{`
          @media (max-width: 760px) { .other-svc-grid { grid-template-columns: 1fr !important; } }
          @media (max-width: 900px) { .features-grid { grid-template-columns: repeat(2,1fr) !important; } }
          @media (max-width: 580px) { .features-grid { grid-template-columns: 1fr !important; } }
          @media (max-width: 640px) { .svc-nav { display: none !important; } .svc-cta-text { display: none; } .svc-cta { padding: 10px 14px !important; } }
        `}</style>
      </section>

      <PageFooter />
    </>
  );
}

function PageFooter() {
  return (
    <footer style={{ padding: "60px 0 40px", borderTop: "1px solid var(--line)" }}>
      <div className="container">
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 40, marginBottom: 48 }} className="page-footer-grid">
          {/* Brand */}
          <div>
            <a href="/" style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, textDecoration: "none" }}>
              <img src="../assets/glamourgeek-isotipo.png" alt="GG" style={{ height: 36 }} />
              <span style={{ fontSize: 18, fontWeight: 700, fontFamily: "var(--font-display)", display: "flex", gap: 4 }}>
                <span style={{ color: "var(--brand-cyan-bright)" }}>Glamour</span>
                <span style={{ color: "var(--brand-coral-bright)" }}>Geek</span>
              </span>
            </a>
            <p className="body-sm" style={{ maxWidth: 300, color: "var(--fg-1)", marginBottom: 24 }}>
              Marketing digital + desarrollo de software. Cancún, México · Trabajamos remoto.
            </p>
            <a href="/#contacto" className="btn btn-primary" style={{ fontSize: 13, padding: "10px 20px", display: "inline-flex" }}>
              Cotiza tu proyecto →
            </a>
          </div>
          {/* Servicios */}
          <div>
            <p className="caption" style={{ marginBottom: 16, color: "var(--fg-2)" }}>Servicios</p>
            {[
              ["Marketing Digital","/servicios/marketing"],
              ["Desarrollo Web","/servicios/web"],
              ["Apps iOS/Android","/servicios/apps"],
              ["E-Commerce","/servicios/ecommerce"],
              ["SEO","/servicios/seo"],
              ["Campañas PPC","/servicios/ppc"],
              ["Redes Sociales","/servicios/social"],
              ["Agencia de IA","/servicios/ia"],
            ].map(([label, href]) => (
              <a key={label} href={href} style={{ display: "block", marginBottom: 10, color: "var(--fg-1)", textDecoration: "none", fontSize: 14, transition: "color 200ms" }}
                onMouseEnter={(e) => (e.currentTarget.style.color = "var(--accent)")}
                onMouseLeave={(e) => (e.currentTarget.style.color = "var(--fg-1)")}
              >{label}</a>
            ))}
          </div>
          {/* Empresa */}
          <div>
            <p className="caption" style={{ marginBottom: 16, color: "var(--fg-2)" }}>Empresa</p>
            {[
              ["Inicio","/"],
              ["Nosotros","/nosotros"],
              ["Proceso","/#proceso"],
              ["Portafolio","/#portafolio"],
              ["FAQ","/#faq"],
              ["Contacto","/#contacto"],
            ].map(([label, href]) => (
              <a key={label} href={href} style={{ display: "block", marginBottom: 10, color: "var(--fg-1)", textDecoration: "none", fontSize: 14, transition: "color 200ms" }}
                onMouseEnter={(e) => (e.currentTarget.style.color = "var(--accent)")}
                onMouseLeave={(e) => (e.currentTarget.style.color = "var(--fg-1)")}
              >{label}</a>
            ))}
          </div>
          {/* Síguenos */}
          <div>
            <p className="caption" style={{ marginBottom: 16, color: "var(--fg-2)" }}>Síguenos</p>
            {[
              ["Instagram","https://www.instagram.com/glamourgeekmx/"],
              ["Facebook","https://www.facebook.com/GlamourGeekMX/"],
              ["WhatsApp","https://wa.me/529982416655"],
              ["Email","mailto:hola@glamourgeek.com.mx"],
            ].map(([label, href]) => (
              <a key={label} href={href}
                target={href.startsWith("http") ? "_blank" : undefined}
                rel={href.startsWith("http") ? "noopener noreferrer" : undefined}
                style={{ display: "block", marginBottom: 10, color: "var(--fg-1)", textDecoration: "none", fontSize: 14, transition: "color 200ms" }}
                onMouseEnter={(e) => (e.currentTarget.style.color = "var(--accent)")}
                onMouseLeave={(e) => (e.currentTarget.style.color = "var(--fg-1)")}
              >{label}</a>
            ))}
          </div>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 24, borderTop: "1px solid var(--line)", flexWrap: "wrap", gap: 16 }}>
          <p className="caption">© 2026 GlamourGeek. Todos los derechos reservados.</p>
          <div style={{ display: "flex", gap: 12 }}>
            {[
              ["https://www.instagram.com/glamourgeekmx/","IG"],
              ["https://www.facebook.com/GlamourGeekMX/","FB"],
              ["https://wa.me/529982416655","WA"],
            ].map(([href, label]) => (
              <a key={label} href={href} target="_blank" rel="noopener noreferrer" style={{
                width: 36, height: 36, borderRadius: "50%",
                border: "1px solid var(--line-strong)",
                display: "flex", alignItems: "center", justifyContent: "center",
                color: "var(--fg-1)", transition: "all 200ms", textDecoration: "none",
                fontSize: 10, fontFamily: "var(--font-mono)", fontWeight: 600,
              }}
                onMouseEnter={(e) => { e.currentTarget.style.borderColor = "var(--accent)"; e.currentTarget.style.color = "var(--accent)"; }}
                onMouseLeave={(e) => { e.currentTarget.style.borderColor = "var(--line-strong)"; e.currentTarget.style.color = "var(--fg-1)"; }}
              >{label}</a>
            ))}
          </div>
        </div>
      </div>
      <style>{`
        @media (max-width: 760px) { .page-footer-grid { grid-template-columns: 1fr 1fr !important; } }
        @media (max-width: 480px) { .page-footer-grid { grid-template-columns: 1fr !important; } }
      `}</style>
    </footer>
  );
}

function FAQItem({ q, a, accent, last }) {
  const [open, setOpen] = useState(false);
  return (
    <div
      onClick={() => setOpen(!open)}
      style={{
        borderTop: "1px solid var(--line)",
        borderBottom: last ? "1px solid var(--line)" : "none",
        padding: "24px 0", cursor: "pointer",
      }}
    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 16 }}>
        <h3 style={{ fontSize: 17, fontWeight: 600, flex: 1 }}>{q}</h3>
        <span style={{ color: accent, flexShrink: 0, transition: "transform 240ms", transform: open ? "rotate(45deg)" : "rotate(0deg)" }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </span>
      </div>
      <div style={{
        maxHeight: open ? 300 : 0, overflow: "hidden",
        opacity: open ? 1 : 0, transition: "all 280ms ease",
      }}>
        <p className="body-sm" style={{ marginTop: 14, color: "var(--fg-1)" }}>{a}</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ServicePage />);
</script>
</body>
</html>
